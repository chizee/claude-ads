<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Claude Ads</title>
  <desc id="desc">Claude Ads is a paid-media operating skill for twelve advertising platforms.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1b2a4a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="#ffffff"/>
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <circle cx="1170" cy="72" r="3" fill="#e7eaf0"/>
    <circle cx="1190" cy="72" r="3" fill="#e7eaf0"/>
    <circle cx="1210" cy="72" r="3" fill="#e7eaf0"/>
    <text x="74" y="198" font-size="88" font-weight="800" fill="#191b20">CLAUDE <tspan fill="#c2412d">ADS</tspan></text>
    <text x="76" y="257" font-size="34" font-weight="700" fill="#374151">The paid-media operating skill</text>
    <rect x="76" y="287" width="58" height="4" rx="2" fill="#c2412d"/>
    <text x="76" y="348" font-size="22" fill="#5b6472">Source-grounded audits, plans, creative workflows,</text>
    <text x="76" y="382" font-size="22" fill="#5b6472">experiments, monitoring, and reports for Claude Code.</text>
    <g transform="translate(76 444)">
      <rect width="132" height="44" rx="22" fill="#fbf3ef"/>
      <text x="66" y="29" text-anchor="middle" font-size="16" font-weight="700" fill="#b93822">12 platforms</text>
      <rect x="145" width="142" height="44" rx="22" fill="#f3f5f7"/>
      <text x="216" y="29" text-anchor="middle" font-size="16" font-weight="700" fill="#374151">Read-only first</text>
      <rect x="300" width="152" height="44" rx="22" fill="#f3f5f7"/>
      <text x="376" y="29" text-anchor="middle" font-size="16" font-weight="700" fill="#374151">Typed contracts</text>
    </g>
    <g transform="translate(840 135)" filter="url(#shadow)">
      <rect width="366" height="372" rx="18" fill="#ffffff" stroke="#eceef2"/>
      <text x="28" y="46" font-size="14" font-weight="700" letter-spacing="1.3" fill="#667085">COMMAND PALETTE</text>
      <rect x="18" y="68" width="330" height="42" rx="10" fill="#fbebe5"/>
      <text x="34" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> audit</text>
      <text x="34" y="146" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> plan</text>
      <text x="34" y="190" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> create</text>
      <text x="34" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> monitor</text>
      <text x="34" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> optimize --draft</text>
      <text x="34" y="322" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="19" fill="#191b20"><tspan fill="#c2412d">/ads</tspan> report</text>
      <circle cx="327" cy="342" r="5" fill="#16a34a"/>
      <text x="310" y="347" text-anchor="end" font-size="12" fill="#667085">verified outputs</text>
    </g>
  </g>
</svg>
