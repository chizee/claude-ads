<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Claude Ads evidence-led scoring</title>
  <desc id="desc">Health, evidence coverage, regulatory exposure, and opportunities remain separate and fail closed.</desc>
  <rect width="1200" height="440" fill="#ffffff"/>
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <text x="28" y="44" font-size="14" font-weight="700" letter-spacing="1.5" fill="#c2412d">EVIDENCE-LED SCORING</text>
    <text x="235" y="44" font-size="14" fill="#667085">| no evidence, no score</text>
    <g>
      <rect x="28" y="82" width="360" height="326" rx="18" fill="#ffffff" stroke="#e4e7ec"/>
      <text x="208" y="128" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="1.3" fill="#667085">ACCOUNT HEALTH</text>
      <circle cx="208" cy="222" r="74" fill="none" stroke="#e8eaee" stroke-width="16"/>
      <path d="M208 148 A74 74 0 0 1 277 249" fill="none" stroke="#c2412d" stroke-width="16" stroke-linecap="round"/>
      <text x="208" y="217" text-anchor="middle" font-size="25" font-weight="800" fill="#191b20">PROFILE</text>
      <text x="208" y="246" text-anchor="middle" font-size="25" font-weight="800" fill="#191b20">GATED</text>
      <rect x="132" y="314" width="152" height="30" rx="15" fill="#fbf3ef"/>
      <text x="208" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#b93822">FAILS CLOSED</text>
      <text x="208" y="373" text-anchor="middle" font-size="12.5" fill="#667085">No approved profile means no health score.</text>
    </g>
    <g>
      <rect x="412" y="82" width="760" height="326" rx="18" fill="#ffffff" stroke="#e4e7ec"/>
      <text x="444" y="126" font-size="18" font-weight="700" fill="#191b20">Four separate decision layers</text>
      <g>
        <rect x="444" y="154" width="696" height="48" rx="10" fill="#fbf3ef"/>
        <text x="466" y="184" font-size="15" font-weight="700" fill="#191b20">Health</text>
        <text x="660" y="184" font-size="14" fill="#5b6472">stable applicable controls from an approved profile</text>
        <rect x="444" y="216" width="696" height="48" rx="10" fill="#f4f6f8"/>
        <text x="466" y="246" font-size="15" font-weight="700" fill="#191b20">Evidence coverage</text>
        <text x="660" y="246" font-size="14" fill="#5b6472">unknown results lower coverage, never health</text>
        <rect x="444" y="278" width="696" height="48" rx="10" fill="#f4f6f8"/>
        <text x="466" y="308" font-size="15" font-weight="700" fill="#191b20">Regulatory exposure</text>
        <text x="660" y="308" font-size="14" fill="#5b6472">reported independently from performance</text>
        <rect x="444" y="340" width="696" height="48" rx="10" fill="#f4f6f8"/>
        <text x="466" y="370" font-size="15" font-weight="700" fill="#191b20">Opportunities</text>
        <text x="660" y="370" font-size="14" fill="#5b6472">beta, premium, or ineligible features stay unscored</text>
      </g>
    </g>
  </g>
</svg>
