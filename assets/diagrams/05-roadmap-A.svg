<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 598"
     preserveAspectRatio="xMidYMid meet" width="100%" font-family="JetBrains Mono, monospace">
<defs>
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
    .bg            { fill: #1F1B16; }
    .bg-soft       { fill: #1F1B16; }
    .box           { fill: #26221C; stroke: #4A3D32; stroke-width: 1; }
    .box-focal     { fill: #2E2620; stroke: #D97757; stroke-width: 1.4; }
    .box-future    { fill: #221E18; stroke: #3A312A; stroke-width: 1; stroke-dasharray: 4 3; }
    .box-soft      { fill: #232019; stroke: #3A312A; stroke-width: 1; }
    .label-h       { font-family: 'JetBrains Mono', monospace; fill: #F5F4ED; font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    .label         { font-family: 'JetBrains Mono', monospace; fill: #F5F4ED; font-size: 14px; font-weight: 600; }
    .label-sub     { font-family: 'JetBrains Mono', monospace; fill: #9C8B7E; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; }
    .label-tiny    { font-family: 'JetBrains Mono', monospace; fill: #6F5F54; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .label-radial  { font-family: 'JetBrains Mono', monospace; fill: #E0D2C4; font-size: 13px; font-weight: 600; letter-spacing: 0.6px; }
    .label-accent  { font-family: 'JetBrains Mono', monospace; fill: #D97757; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .label-inter   { font-family: 'Inter', system-ui, sans-serif; fill: #F5F4ED; font-size: 14px; font-weight: 500; }
    .conn          { stroke: #6F5F54; stroke-width: 1; fill: none; }
    .conn-soft     { stroke: #4A3D32; stroke-width: 1; fill: none; }
    .conn-dashed   { stroke: #4A3D32; stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
    .accent-fill   { fill: #D97757; }
    .accent-bright { fill: #E89270; }
    .corner-mark   { font-family: 'JetBrains Mono', monospace; fill: #5A5750; font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; }
  ]]></style>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#6F5F54"/>
  </marker>
  <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#4A3D32"/>
  </marker>
</defs>
<!-- Window outer border + bg -->
<rect x="0.5" y="0.5" width="1699" height="597" rx="10" fill="#2A2520" stroke="#3A312A" stroke-width="1"/>

  <!-- OS window title bar -->
  <path d="M 0 10 Q 0 0 10 0 L 1690 0 Q 1700 0 1700 10 L 1700 48 L 0 48 Z" fill="#2A2520"/>
  <line x1="0" y1="48" x2="1700" y2="48" stroke="#3A312A" stroke-width="1"/>
  <text x="20" y="29.0" font-family="JetBrains Mono, monospace" font-size="15" fill="#E0D2C4" font-weight="600">claude-ads.app — 05 · roadmap · A</text>
  <!-- Traffic lights (right-aligned) -->
  <circle cx="1616"   cy="24.0" r="9" fill="#fbbf24" stroke="#3A312A" stroke-width="0.7"/>
  <circle cx="1644"   cy="24.0" r="9" fill="#10b981"  stroke="#3A312A" stroke-width="0.7"/>
  <circle cx="1672" cy="24.0" r="9" fill="#ef4444"    stroke="#3A312A" stroke-width="0.7"/>

<!-- Content area: dark canvas, shifted down by TITLE_H -->
<g transform="translate(0, 48)">
  <rect class="bg" width="1700" height="550"/>
  <line x1="120" y1="280" x2="1580" y2="280" class="conn-soft" stroke-width="2"/>
<circle cx="120.0" cy="280" r="10" fill="#D97757" stroke="#0A0807" stroke-width="2"/>
<rect x="-20.0" y="125.0" width="280" height="130" rx="4" class="box"></rect>
<text x="120.0" y="175.0" class="label-accent" text-anchor="middle">v1.5.1 · apr 2026</text>
<text x="120.0" y="195.0" class="label" text-anchor="middle">security hardening</text>
<text x="120.0" y="215.0" class="label" text-anchor="middle"></text>
<text x="120.0" y="220" class="label-tiny" text-anchor="middle">ssrf · err sanitize · ci</text>
<path d="M 120.0 270 L 120.0 255" class="conn-soft"/>
<circle cx="485.0" cy="280" r="10" fill="#D97757" stroke="#0A0807" stroke-width="2"/>
<rect x="345.0" y="305.0" width="280" height="130" rx="4" class="box"></rect>
<text x="485.0" y="355.0" class="label-accent" text-anchor="middle">v1.6.0 · may 2026</text>
<text x="485.0" y="375.0" class="label" text-anchor="middle">foundation polish</text>
<text x="485.0" y="395.0" class="label" text-anchor="middle"></text>
<text x="485.0" y="400" class="label-tiny" text-anchor="middle">frontmatter · triggers · audits</text>
<path d="M 485.0 290 L 485.0 305" class="conn-soft"/>
<circle cx="850.0" cy="280" r="14" fill="#E89270" stroke="#0A0807" stroke-width="2"/>
<rect x="710.0" y="125.0" width="280" height="130" rx="4" class="box-focal"><animate attributeName="opacity" values="0.85;1;0.85" dur="4.2s" repeatCount="indefinite"/></rect>
<text x="850.0" y="175.0" class="label-accent" text-anchor="middle">v1.7.0 · may 2026</text>
<text x="850.0" y="195.0" class="label" text-anchor="middle">wave 2 — depth</text>
<text x="850.0" y="215.0" class="label" text-anchor="middle"></text>
<text x="850.0" y="220" class="label-tiny" text-anchor="middle">eval harness · cross-host</text>
<text x="850.0" y="236" class="label-tiny" text-anchor="middle">ai max · andromeda · amazon</text>
<text x="850.0" y="252" class="label-tiny" text-anchor="middle">attribution · sst</text>
<path d="M 850.0 266 L 850.0 255" class="conn-soft"/>
<circle cx="1215.0" cy="280" r="10" fill="#D97757" stroke="#0A0807" stroke-width="2"/>
<rect x="1075.0" y="305.0" width="280" height="130" rx="4" class="box"></rect>
<text x="1215.0" y="355.0" class="label-accent" text-anchor="middle">v1.8.0 · q3 2026</text>
<text x="1215.0" y="375.0" class="label" text-anchor="middle">wave 3 — breadth</text>
<text x="1215.0" y="395.0" class="label" text-anchor="middle"></text>
<text x="1215.0" y="400" class="label-tiny" text-anchor="middle">walmart · ctv · retail-media</text>
<text x="1215.0" y="416" class="label-tiny" text-anchor="middle">industry templates</text>
<path d="M 1215.0 290 L 1215.0 305" class="conn-soft"/>
<circle cx="1580.0" cy="280" r="10" fill="#D97757" stroke="#0A0807" stroke-width="2"/>
<rect x="1440.0" y="125.0" width="280" height="130" rx="4" class="box"></rect>
<text x="1580.0" y="175.0" class="label-accent" text-anchor="middle">v2.0.0 · q4 2026</text>
<text x="1580.0" y="195.0" class="label" text-anchor="middle">measurement + trust</text>
<text x="1580.0" y="215.0" class="label" text-anchor="middle"></text>
<text x="1580.0" y="220" class="label-tiny" text-anchor="middle">pmax feed · mmm · incrementality</text>
<text x="1580.0" y="236" class="label-tiny" text-anchor="middle">compliance pack</text>
<path d="M 1580.0 270 L 1580.0 255" class="conn-soft"/>
  <text x="1680" y="538" class="corner-mark" text-anchor="end">05 · roadmap · A</text>
</g>
</svg>
